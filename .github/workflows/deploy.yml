name: Vercel Production Deployment

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Clear local Vercel metadata
              run: rm -rf .vercel

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel project settings and env
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build prebuilt output
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy staged production build without domain assignment
              run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
